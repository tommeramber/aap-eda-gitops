---
# send-approval-request.yml
#
# Node 1 in the Scenario B Approval Workflow.
#
# Sends an approval request email to the configured approver address.
# The email body embeds the workflow job ID so the microservice can
# identify which workflow to approve when it detects an "approved" reply.
#
# The microservice will approve all pending workflow approvals when it
# detects the keyword — safe for demos where only one approval runs at a time.
#
# Required extra_vars (set "Prompt on Launch" in the Job Template):
#   repo_url        - Git clone URL
#   commit_sha      - Full commit SHA
#   changed_files   - List of changed file paths
#   approver_email  - Email address that receives the approval request
#
# Required credential (injected as env vars via SMTP credential type):
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS
#
# AAP magic variable automatically injected inside a Workflow:
#   tower_workflow_job_id  — ID of the running workflow job

- name: Send email approval request for pending GitOps change
  hosts: localhost
  gather_facts: false
  vars:
    repo_url: ""
    commit_sha: ""
    changed_files: []
    approver_email: "approver@example.com"

  tasks:

    - name: Capture workflow job ID from AAP magic variable
      ansible.builtin.set_fact:
        workflow_job_id: "{{ tower_workflow_job_id }}"

    - name: Send approval request email to approver
      community.general.mail:
        host: "{{ lookup('env', 'SMTP_HOST') | default('smtp.gmail.com') }}"
        port: "{{ lookup('env', 'SMTP_PORT') | default('587') | int }}"
        username: "{{ lookup('env', 'SMTP_USER') }}"
        password: "{{ lookup('env', 'SMTP_PASS') }}"
        to: "{{ approver_email }}"
        subject: "[GitOps APPROVAL REQUIRED] {{ commit_sha[:8] }}"
        body: |
          A GitOps change requires your approval before it is applied to the OCP cluster.

          Repository : {{ repo_url }}
          Commit     : {{ commit_sha }}

          Changed manifests:
          {% for f in changed_files %}
            - {{ f }}
          {% endfor %}

          ────────────────────────────────────────────────────
          To APPROVE this change, reply to this email with the
          single word (nothing else in the body):

            approved

          ────────────────────────────────────────────────────
          Workflow Reference: WFJ-{{ workflow_job_id }}
          (The automated approval microservice running on OCP will
          detect your reply and approve the workflow continuation.)

          This approval request expires in 24 hours.
