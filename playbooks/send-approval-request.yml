---
# send-approval-request.yml
#
# Node 1 in the Scenario B Approval Workflow.
#
# Clones the repo at the pushed commit, reads each changed YAML file,
# and sends an approval request email with the full file contents embedded
# so the approver can see exactly what change they are approving.
#
# Required extra_vars (set in Job Template Extra Variables):
#   repo_url        - Git clone URL
#   commit_sha      - Full commit SHA
#   changed_files   - List of changed file paths (passed by EDA via Prompt on Launch)
#   approver_email  - Address that RECEIVES the approval request (e.g. tommeramber@gmail.com)
#   reply_to_email  - Address replies are SENT TO — must be the microservice's inbox
#                     (e.g. AAP-DEMO@gmail.com). The microservice monitors this inbox.
#                     Gmail SMTP sends FROM the authenticated account; Reply-To routes
#                     the approver's reply to the microservice's monitored inbox.
#
# Required credential (injected as env vars via SMTP credential type):
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS
#
# AAP magic variable automatically injected inside a Workflow:
#   tower_workflow_job_id  — ID of the running workflow job

- name: Send email approval request with file contents for pending GitOps change
  hosts: localhost
  gather_facts: false
  vars:
    repo_url: ""
    commit_sha: ""
    changed_files: []
    approver_email: "approver@example.com"

  tasks:

    - name: Capture workflow job ID from AAP magic variable
      ansible.builtin.set_fact:
        workflow_job_id: "{{ tower_workflow_job_id }}"

    - name: Filter for YAML files in changed_files
      ansible.builtin.set_fact:
        yaml_files: "{{ changed_files | select('match', '.*\\.ya?ml$') | list }}"

    - name: Clone repository at the pushed commit SHA
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: /tmp/gitops-approval-repo
        version: "{{ commit_sha }}"
        force: true
      no_log: true
      when: repo_url != '' and yaml_files | length > 0

    - name: Read content of each changed YAML file
      ansible.builtin.slurp:
        src: "/tmp/gitops-approval-repo/{{ item }}"
      loop: "{{ yaml_files }}"
      register: file_slurps
      when: yaml_files | length > 0

    - name: Build email body with embedded file contents
      ansible.builtin.set_fact:
        email_body: |
          A GitOps change requires your approval before it is applied to the OCP cluster.

          Repository : {{ repo_url }}
          Commit     : {{ commit_sha }}

          ════════════════════════════════════════════════════
          CHANGED MANIFESTS ({{ yaml_files | length }} file(s))
          ════════════════════════════════════════════════════
          {% for result in file_slurps.results %}

          File: {{ result.item }}
          ────────────────────────────────────────────────────
          {{ result.content | b64decode }}
          {% endfor %}
          ════════════════════════════════════════════════════

          To APPROVE this change, reply to this email with the
          single word (nothing else in the body):

            approved

          ────────────────────────────────────────────────────
          Workflow Reference: WFJ-{{ workflow_job_id }}
          (The automated approval microservice running on OCP will
          detect your reply and approve the workflow continuation.)

          This approval request expires in 24 hours.

    - name: Send approval request email to approver
      community.general.mail:
        host: "{{ lookup('env', 'SMTP_HOST') | default('smtp.gmail.com') }}"
        port: "{{ lookup('env', 'SMTP_PORT') | default('587') | int }}"
        username: "{{ lookup('env', 'SMTP_USER') }}"
        password: "{{ lookup('env', 'SMTP_PASS') }}"
        to: "{{ approver_email }}"
        subject: "[GitOps APPROVAL REQUIRED] {{ commit_sha[:8] }} — {{ yaml_files | join(', ') }}"
        body: "{{ email_body }}"
