---
# OCP Secret — Email Approval Microservice Configuration
#
# INSTRUCTIONS:
#   1. Copy this file: cp email-approver-secret.example.yaml email-approver-secret.yaml
#   2. Fill in all placeholder values marked with <...>
#   3. Apply:  oc apply -f ocp/email-approver-secret.yaml -n aap
#   4. NEVER commit email-approver-secret.yaml to Git (it is in .gitignore)
#
# AAP_TOKEN: generate with:
#   curl -sk -X POST \
#     "https://demo-aap-aap.apps.cluster-jx4b7.dynamic.redhatworkshops.io/api/v2/users/1/tokens/" \
#     -H "Content-Type: application/json" \
#     -u admin:<password> \
#     -d '{"description": "email-approver-microservice", "scope": "write"}'
#
# Gmail IMAP_PASS: use an App Password, not your account password.
#   https://myaccount.google.com/apppasswords

apiVersion: v1
kind: Secret
metadata:
  name: email-approver-secret
  namespace: aap
  labels:
    app: email-approver
type: Opaque
stringData:
  # IMAP inbox to monitor for approval replies
  IMAP_HOST: "<imap.gmail.com or your IMAP server>"
  IMAP_PORT: "993"
  IMAP_USER: "<monitor-account@your-domain.com>"
  IMAP_PASS: "<app-password-or-imap-password>"

  # AAP Automation Controller URL (NOT the Platform Gateway — /api/v2/ only works on the controller)
  AAP_BASE_URL: "https://demo-aap-controller-aap.apps.cluster-jx4b7.dynamic.redhatworkshops.io"
  AAP_TOKEN: "<paste-aap-token-here>"
  AAP_VERIFY_SSL: "false"

  # Approval detection settings
  APPROVAL_KEYWORD: "approved"
  SUBJECT_FILTER: "[GitOps APPROVAL REQUIRED]"
  POLL_INTERVAL_SECONDS: "30"
