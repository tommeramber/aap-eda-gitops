---
# OCP Secret — Email Approval Microservice Configuration
#
# DO NOT edit this file directly. Generate email-approver-secret.yaml with:
#
#   sed \
#     -e "s|__AAP_CONTROLLER_URL__|${AAP_CONTROLLER_URL}|g" \
#     -e "s|__AAP_MICROSERVICE_TOKEN__|${AAP_MICROSERVICE_TOKEN}|g" \
#     -e "s|__IMAP_USER__|${IMAP_USER}|g" \
#     -e "s|__IMAP_PASS__|${IMAP_PASS}|g" \
#     -e "s|__IMAP_HOST__|${IMAP_HOST}|g" \
#     ocp/email-approver-secret.example.yaml > ocp/email-approver-secret.yaml
#
# Then apply:
#   oc apply -f ocp/email-approver-secret.yaml -n aap
#
# NEVER commit email-approver-secret.yaml to Git (it is in .gitignore)
#
# Required shell variables before running sed:
#   AAP_CONTROLLER_URL      — exported in Lab Credentials bootstrap block
#   AAP_MICROSERVICE_TOKEN  — exported in Section 11 Step 1
#   IMAP_HOST               — e.g. imap.gmail.com
#   IMAP_USER               — the inbox address that receives approval replies
#   IMAP_PASS               — IMAP password or Gmail App Password
#
# Set IMAP variables:
#   export IMAP_HOST="imap.gmail.com"
#   export IMAP_USER="example@example.com"
#   export IMAP_PASS="your-app-password"

apiVersion: v1
kind: Secret
metadata:
  name: email-approver-secret
  namespace: aap
  labels:
    app: email-approver
type: Opaque
stringData:
  # IMAP inbox to monitor for approval replies
  IMAP_HOST: "__IMAP_HOST__"
  IMAP_PORT: "993"
  IMAP_USER: "__IMAP_USER__"
  IMAP_PASS: "__IMAP_PASS__"

  # AAP Automation Controller URL — /api/v2/ lives here, not on the Platform Gateway
  AAP_BASE_URL: "__AAP_CONTROLLER_URL__"
  AAP_TOKEN: "__AAP_MICROSERVICE_TOKEN__"
  AAP_VERIFY_SSL: "false"

  # Approval detection settings
  APPROVAL_KEYWORD: "approved"
  SUBJECT_FILTER: "[GitOps APPROVAL REQUIRED]"
  POLL_INTERVAL_SECONDS: "30"
