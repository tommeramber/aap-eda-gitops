---
# Scenario A — Direct GitOps Apply
#
# Listens for GitHub push events on the main branch.
# On every push, triggers the AAP job template that applies
# changed YAML manifests directly to OCP without any approval gate.
#
# Activate this rulebook in EDA UI with:
#   Service Name: eda-gitops-webhook
#   AAP Controller Credential: aap-controller-credential

- name: GitOps Direct Apply — listen for GitHub push events
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Apply YAML changes on push to main
      condition: >
        event.payload.ref is defined and
        event.payload.ref == "refs/heads/main" and
        event.payload.commits is defined

      action:
        run_job_template:
          name: "gitops-apply-networkpolicy"
          organization: "Default"
          job_args:
            extra_vars:
              repo_url: "{{ event.payload.repository.clone_url }}"
              commit_sha: "{{ event.payload.after }}"
              changed_files: >-
                {{ event.payload.commits
                   | map(attribute='modified') | flatten
                   | select('match', '.*\.ya?ml$') | list }}
              repo_ref: "{{ event.payload.after }}"
